# Pull-request validation. Runs on every PR + every push to non-main
# branches. Builds + tests everything; no deploy. The deploy.yml on main
# does the artifact composition + Azure push.

name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches-ignore: [ main ]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '22.x'

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore api/CredoCms.slnx

      - name: Build (warnings as errors)
        run: dotnet build api/CredoCms.slnx --configuration Release --no-restore -p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test api/CredoCms.slnx --configuration Release --no-build --logger "console;verbosity=normal"

  spa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install
        working-directory: app
        run: npm ci

      - name: Test
        working-directory: app
        run: npm test

      - name: Build
        working-directory: app
        run: npm run build

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install
        working-directory: docs
        run: npm ci

      - name: Build (Astro + Pagefind)
        working-directory: docs
        run: npm run build
